<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Dentia — 歯科医院 架電CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0c8c8b; --teal-d:#0a7877;
    --ink:#1f2a33; --ink2:#3a4750; --muted:#6b7682; --muted2:#9aa4ae;
    --line:#eceff1; --line2:#e3e7ea; --page:#ffffff; --card:#f6f8f9; --field:#ffffff;
    --gray:#9aa4ae;  --gray-bg:#eef1f3;  --gray-fg:#69737d;
    --amber:#eab308; --amber-bg:#fdf2d4; --amber-fg:#c08a05;
    --orange:#f3722c;--orange-bg:#fde6d6;--orange-fg:#df6320;
    --cyan:#0c8c8b;  --cyan-bg:#d3edec;  --cyan-fg:#0a8584;
    --green:#22b14c; --green-bg:#d9f3df; --green-fg:#1a9a45;
    --red:#ef5350;   --red-bg:#fce0df;   --red-fg:#dc4843;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;
    background:#e9edf0; color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  svg{display:block}
  input,textarea{font-family:inherit}

  /* device frame */
  .app-root{ --teal:#0c8c8b; }
  .device{
    width:390px; height:844px; background:#fff; border-radius:46px;
    border:11px solid #11161b; box-shadow:0 30px 70px rgba(20,28,36,.34),0 6px 18px rgba(20,28,36,.18);
    overflow:hidden; position:relative; transform-origin:center center;
  }
  .device-screen{ position:absolute; inset:0; display:flex; flex-direction:column; background:var(--page); }
  .screen-scroll{ flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .screen-scroll::-webkit-scrollbar{ width:0 }
  .screen{ min-height:100%; display:flex; flex-direction:column; background:var(--page); }

  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:14px 26px 2px;font-size:14px;font-weight:700;color:var(--ink)}
  .sb-r{display:flex;align-items:center;gap:6px;color:var(--ink)}
  .apphead{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 12px;color:var(--ink)}
  .apphead .title{font-size:17px;font-weight:700}
  .ah-btn{background:none;border:none;color:var(--ink);padding:6px;display:flex}
  .ah-btn.ttl-link{color:var(--teal);font-size:15px;font-weight:600}
  .pbody{padding:4px 18px 0;flex:1;display:flex;flex-direction:column}
  .pbody.np{padding-top:0}
  .pbody.list-body{padding:4px 16px 0}

  .divider{height:1px;background:var(--line);margin:0 -18px}
  .sec{padding:16px 0}
  .sec-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:13px}
  .sec-head h3{font-size:15px;font-weight:700;color:var(--ink)}
  .link{font-size:13px;font-weight:600;color:var(--teal);cursor:pointer}

  /* presence */
  .presence-row{display:flex;gap:8px;flex-wrap:wrap;padding:6px 0 2px}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line2);
        border-radius:999px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--ink2);white-space:nowrap}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* progress */
  .pc-top{display:flex;justify-content:space-between;align-items:baseline}
  .pc-top .lbl{font-size:14px;font-weight:700;color:var(--ink)}
  .pc-num{margin:8px 0 12px;display:flex;align-items:baseline;gap:6px}
  .pc-num b{font-size:34px;font-weight:900;color:var(--ink);line-height:1}
  .pc-num span{font-size:15px;color:var(--muted);font-weight:500;white-space:nowrap}
  .bar{height:8px;border-radius:6px;background:var(--line2);overflow:hidden}
  .bar i{display:block;height:100%;background:var(--teal);border-radius:6px;transition:width .5s ease}
  .stat3{display:flex;margin-top:18px}
  .stat3 .cell{flex:1;text-align:center;padding:0 4px}
  .stat3 .cell+.cell{border-left:1px solid var(--line)}
  .stat3 .k{font-size:12px;color:var(--muted);font-weight:500}
  .stat3 .v{font-size:19px;font-weight:800;color:var(--ink);margin-top:5px;white-space:nowrap}
  .stat3 .v small{font-size:12px;font-weight:600;color:var(--muted);margin-left:1px}

  /* badge */
  .badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:7px;font-size:12px;font-weight:700;line-height:1.2;white-space:nowrap}
  .b-gray{background:var(--gray-bg);color:var(--gray-fg)}
  .b-amber{background:var(--amber-bg);color:var(--amber-fg)}
  .b-orange{background:var(--orange-bg);color:var(--orange-fg)}
  .b-cyan{background:var(--cyan-bg);color:var(--cyan-fg)}
  .b-green{background:var(--green-bg);color:var(--green-fg)}
  .b-red{background:var(--red-bg);color:var(--red-fg)}

  /* clinic block (home) */
  .clinic .row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .clinic .row1 .ago{font-size:13px;color:var(--muted2);font-weight:500}
  .clinic .name{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:.3px}
  .clinic .addr{font-size:13px;color:var(--muted);margin-top:7px;font-weight:500}
  .tel{display:inline-flex;align-items:center;gap:7px;font-size:14px;color:var(--ink2);margin-top:9px;font-weight:600;white-space:nowrap}
  .memo-lbl{font-size:12px;color:var(--muted2);margin-top:16px;font-weight:600}
  .memo-tx{font-size:14px;color:var(--ink2);margin-top:5px;font-weight:500;line-height:1.6}

  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:none;
       font-weight:700;border-radius:14px;transition:transform .08s ease,background .15s}
  .btn:active{transform:scale(.985)}
  .btn-primary{background:var(--teal);color:#fff;font-size:18px;padding:17px;box-shadow:0 6px 16px color-mix(in srgb,var(--teal) 28%,transparent)}
  .btn-primary.disabled{background:var(--line2);color:var(--muted2);box-shadow:none}
  .btn-primary.ok{background:var(--green)}
  .btn-outline{background:var(--field);color:var(--teal);border:1.5px solid color-mix(in srgb,var(--teal) 30%,var(--line2));font-size:15px;padding:14px}
  .clinic .btn-primary{margin-top:18px}

  /* schedule */
  .sched .item{display:flex;align-items:center;gap:14px;padding:13px 0;font-size:14px;cursor:pointer}
  .sched .item+.item{border-top:1px solid var(--line)}
  .sched .time{font-weight:800;color:var(--ink);width:48px;flex:none}
  .sched .cl{flex:1;color:var(--ink2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* tab bar */
  .tabbar{flex:none;display:flex;align-items:flex-end;justify-content:space-around;
          border-top:1px solid var(--line);padding:7px 6px 11px;background:var(--page)}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--muted2);flex:1;background:none;border:none}
  .tab.on{color:var(--teal)}
  .tab.fab{gap:6px;color:var(--ink2)}
  .fab-c{width:54px;height:54px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;
         box-shadow:0 8px 18px color-mix(in srgb,var(--teal) 38%,transparent)}

  /* toast */
  .toast{position:absolute;left:14px;right:14px;top:46px;z-index:40;display:flex;align-items:center;gap:11px;
         background:#fff;border:1px solid var(--line2);border-radius:15px;padding:11px 14px;
         box-shadow:0 12px 30px rgba(20,28,36,.18);animation:toastIn .35s cubic-bezier(.2,.9,.3,1.3)}
  @keyframes toastIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
  .toast .t-body{flex:1;min-width:0}
  .toast .t-body b{display:block;font-size:13px;font-weight:700;color:var(--ink)}
  .toast .t-body span{display:block;font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .toast .t-dot{width:9px;height:9px;border-radius:50%;flex:none;animation:pulse 1.4s infinite}
  .av{border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}

  /* list */
  .search-bar{display:flex;align-items:center;gap:9px;border:1.5px solid var(--line2);border-radius:12px;padding:11px 13px;background:var(--field);margin-top:6px}
  .search-bar input{flex:1;border:none;outline:none;background:transparent;font-size:14px;color:var(--ink)}
  .search-bar input::placeholder{color:var(--muted2)}
  .search-bar .clr{background:none;border:none;color:var(--muted2);display:flex;padding:2px}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:11px 0 2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{height:0}
  .chip{flex:none;border:1.5px solid var(--line2);background:var(--field);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--ink2);white-space:nowrap}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#fff}
  .chip-gray.on{background:var(--gray);border-color:var(--gray)}
  .chip-amber.on{background:var(--amber-fg);border-color:var(--amber-fg)}
  .chip-orange.on{background:var(--orange);border-color:var(--orange)}
  .chip-cyan.on{background:var(--cyan);border-color:var(--cyan)}
  .chip-green.on{background:var(--green);border-color:var(--green)}
  .chip-red.on{background:var(--red);border-color:var(--red)}
  .list-count{font-size:12px;color:var(--muted);font-weight:600;padding:14px 2px 8px}
  .cards{display:flex;flex-direction:column;gap:12px;padding-bottom:18px}
  .empty{text-align:center;color:var(--muted2);font-size:14px;font-weight:500;padding:24px 0}

  .listcard{background:var(--field);border:1px solid var(--line2);border-radius:14px;padding:15px 16px;transition:box-shadow .2s,border-color .2s}
  .listcard.flash{border-color:var(--teal);box-shadow:0 0 0 3px color-mix(in srgb,var(--teal) 18%,transparent);animation:flashPop .5s}
  @keyframes flashPop{0%{transform:scale(1)}40%{transform:scale(1.015)}100%{transform:scale(1)}}
  .listcard .r1{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .listcard .r1 .ago{font-size:12px;color:var(--muted2);font-weight:500}
  .listcard .nm{font-size:18px;font-weight:800;color:var(--ink)}
  .listcard .ad{font-size:13px;color:var(--muted);margin-top:6px;font-weight:500}
  .listcard .te{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink2);margin-top:8px;font-weight:600;white-space:nowrap}
  .listcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:12px;border-top:1px solid var(--line)}
  .listcard .meta{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted);font-weight:500}
  .listcard .meta span{display:flex;align-items:center;gap:6px;white-space:nowrap}
  .listcard .mini-fab{width:42px;height:42px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 6px 14px color-mix(in srgb,var(--teal) 32%,transparent)}

  /* detail */
  .p3-top{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .p3-top .name{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:.3px}
  .call-fab{width:50px;height:50px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;
            box-shadow:0 8px 18px color-mix(in srgb,var(--teal) 34%,transparent);flex:none}
  .badges{display:flex;gap:8px;margin-top:14px}
  .tabs{display:flex;border-bottom:1.5px solid var(--line);margin-top:20px}
  .tabs .t{flex:1;text-align:center;padding:12px 0 13px;font-size:15px;font-weight:700;color:var(--muted2);position:relative;cursor:pointer}
  .tabs .t.on{color:var(--teal)}
  .tabs .t.on::after{content:"";position:absolute;left:0;right:0;bottom:-1.5px;height:2.5px;background:var(--teal);border-radius:2px}
  .timeline{padding-top:18px}
  .tl{display:flex;gap:14px}
  .tl .rail{display:flex;flex-direction:column;align-items:center;flex:none;width:14px}
  .tl .ring{width:13px;height:13px;border-radius:50%;border:2.5px solid var(--cyan);background:var(--page);margin-top:4px;flex:none}
  .tl .ring.r-gray{border-color:var(--gray)}.tl .ring.r-amber{border-color:var(--amber)}
  .tl .ring.r-orange{border-color:var(--orange)}.tl .ring.r-cyan{border-color:var(--cyan)}
  .tl .ring.r-green{border-color:var(--green)}.tl .ring.r-red{border-color:var(--red)}
  .tl .stem{width:2px;flex:1;background:var(--line2);margin-top:4px}
  .tl .body{padding-bottom:22px;flex:1}
  .tl:last-child .body{padding-bottom:8px}
  .tl .meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .tl .dt{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap}
  .tl .who{font-size:13px;color:var(--ink2);font-weight:600;white-space:nowrap}
  .tl .meta .badge{margin-left:auto}
  .tl .note{font-size:14px;color:var(--ink2);margin-top:8px;font-weight:500;line-height:1.6}
  .info{padding-top:8px}
  .info-row{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .info-row .ik{width:78px;flex:none;font-size:13px;color:var(--muted);font-weight:600}
  .info-row .iv{font-size:14px;color:var(--ink);font-weight:600;line-height:1.5}
  .info-row .iv.link{color:var(--teal)}
  .map{display:flex;align-items:center;gap:9px;margin-top:16px;color:var(--teal);font-size:14px;font-weight:700;
       border:1.5px dashed color-mix(in srgb,var(--teal) 35%,var(--line2));border-radius:12px;padding:16px;justify-content:center}
  .p3foot,.p2foot{margin-top:auto;padding:18px 0 22px}

  /* result input */
  .p2-name{font-size:22px;font-weight:800;color:var(--ink);text-align:center;letter-spacing:.3px;margin-top:8px}
  .p2-tel{display:block;text-align:center;font-size:15px;color:var(--ink2);font-weight:600;margin-top:6px}
  .fld-lbl{font-size:14px;font-weight:700;color:var(--ink);margin:22px 0 12px}
  .stgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .stbtn{border:1.5px solid transparent;border-radius:16px;padding:16px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;font-size:15px;font-weight:700;transition:transform .08s,box-shadow .15s}
  .stbtn:active{transform:scale(.97)}
  .stbtn.on{box-shadow:0 0 0 2.5px var(--page),0 0 0 5px currentColor}
  .stbtn .circ{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .s-gray{background:var(--gray-bg);color:var(--gray-fg)}.s-gray .line-ic{color:var(--gray)}
  .s-amber{background:var(--amber-bg);color:var(--amber-fg)}.s-amber .line-ic{color:var(--amber-fg)}
  .s-orange{background:var(--orange-bg);color:var(--orange-fg)}.s-orange .circ{background:var(--orange)}
  .s-cyan{background:var(--cyan-bg);color:var(--cyan-fg)}.s-cyan .circ{background:var(--cyan)}
  .s-green{background:var(--green-bg);color:var(--green-fg)}.s-green .circ{background:var(--green)}
  .s-red{background:var(--red-bg);color:var(--red-fg)}.s-red .circ{background:var(--red)}
  .ta-wrap{border:1.5px solid var(--line2);border-radius:14px;padding:13px 14px 7px;background:var(--field)}
  .ta-wrap textarea{width:100%;border:none;outline:none;resize:none;font-size:14px;color:var(--ink);min-height:74px;background:transparent;line-height:1.6}
  .ta-wrap textarea::placeholder{color:var(--muted2)}
  .ta-count{text-align:right;font-size:12px;color:var(--muted2);font-weight:500}
  .voice{margin-top:14px}
  .p2foot .cap{text-align:center;font-size:13px;color:var(--muted2);margin-top:13px;font-weight:500}

  /* history feed */
  .feed{display:flex;flex-direction:column;padding:10px 0 18px}
  .feed-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
  .fi-body{flex:1;min-width:0}
  .fi-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .fi-top b{font-size:15px;font-weight:700;color:var(--ink)}
  .fi-time{font-size:12px;color:var(--muted2);font-weight:600;white-space:nowrap}
  .fi-meta{display:flex;align-items:center;gap:9px;margin-top:7px}
  .fi-who{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
  .fi-note{font-size:13px;color:var(--ink2);margin-top:7px;font-weight:500;line-height:1.55}

  /* dashboard */
  .dash-card{background:var(--card);border:1px solid var(--line2);border-radius:16px;padding:20px;margin-top:12px}
  .dash-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
  .dash-head h4{font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap}
  .dash3,.dash2{display:flex}
  .dash3 .c,.dash2 .c{flex:1;text-align:center}
  .dash3 .k,.dash2 .k{font-size:13px;color:var(--muted);font-weight:600}
  .dash3 .v,.dash2 .v{font-size:21px;font-weight:900;color:var(--ink);margin-top:7px}
  .dash3 .v small,.dash2 .v small{font-size:12px;font-weight:700;color:var(--muted);margin-left:1px}
  .dash-bar{height:1px;background:var(--line2);margin:18px 0}
  .cc-block{margin-top:20px;padding-bottom:8px}
  .cc-block h2{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:8px}
  .sumrow{display:flex;align-items:center;gap:11px;padding:11px 0;font-size:14px;border-bottom:1px solid var(--line);cursor:pointer}
  .sumrow .sdot{width:10px;height:10px;border-radius:50%;flex:none}
  .sumrow .slabel{color:var(--ink2);font-weight:600}
  .sumrow .scount{margin-left:auto;color:var(--ink);font-weight:800;white-space:nowrap}
  .sumrow .scount small{font-size:11px;font-weight:600;color:var(--muted);margin-left:1px}
  .hbars{display:flex;flex-direction:column;gap:11px;padding-top:6px}
  .hbar{display:flex;align-items:center;gap:10px}
  .hb-label{width:72px;flex:none;font-size:12px;color:var(--ink2);font-weight:600}
  .hb-track{flex:1;height:9px;background:var(--line2);border-radius:6px;overflow:hidden}
  .hb-track i{display:block;height:100%;border-radius:6px;transition:width .5s}
  .hb-num{width:20px;text-align:right;font-size:13px;font-weight:800;color:var(--ink)}

  /* in-call screen */
  .incall-screen{background:var(--page)}
  .incall-hero{display:flex;flex-direction:column;align-items:center;padding:8px 0 20px}
  .call-pulse-ring{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
  .call-pulse-ring::before,.call-pulse-ring::after{
    content:'';position:absolute;inset:0;border-radius:50%;
    border:2px solid var(--teal);animation:callRipple 2s ease-out infinite;
  }
  .call-pulse-ring::after{animation-delay:.7s}
  @keyframes callRipple{
    0%{transform:scale(.7);opacity:.7}
    100%{transform:scale(1.6);opacity:0}
  }
  .call-pulse-fab{width:72px;height:72px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;
                  box-shadow:0 8px 24px color-mix(in srgb,var(--teal) 42%,transparent);position:relative;z-index:1}
  .incall-name{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:.3px;margin-top:18px;text-align:center}
  .incall-tel{font-size:14px;color:var(--muted);font-weight:500;margin-top:6px}
  .incall-timer{font-size:26px;font-weight:900;color:var(--teal);margin-top:10px;font-variant-numeric:tabular-nums;letter-spacing:.06em}
  .incall-foot{padding:0 18px 28px}

<!-- ═══════════════ REALTIME ═══════════════ -->
<script>
(function(){
  const CH='dentia-sync-v1';
  const TAB_ID=Math.random().toString(36).slice(2,8);
  const BOT_NOTES={
    noanswer:['呼び出し音のみ。後ほど再架電。','話し中。時間を空けて再トライ。','留守電。折り返し依頼を残した。'],
    absent:  ['受付対応。担当は午後在席とのこと。','院長不在。明日午前に再連絡。','担当者会議中。夕方かけ直す。'],
    heard:   ['新患集客に課題感あり。資料送付。','予約管理をExcel運用中。改善余地大。','リコール率の改善に関心あり。'],
    appo:    ['来院デモのアポ獲得！','院長と商談アポ確定。','オンラインデモの日程確定。'],
    reject:  ['現状システムで満足、今回は見送り。','予算が合わず今期は見送り。'],
  };
  const ACTIVITIES=['架電中','メモを更新中','一覧を閲覧中','医院詳細を確認中','ステータスを更新中'];
  function pick(a){return a[Math.floor(Math.random()*a.length)];}
  function makeRealtime({onRemote,onPresence,getClinics}){
    let channel=null;
    try{channel=new BroadcastChannel(CH);}catch(e){channel=null;}
    if(channel){
      channel.onmessage=(ev)=>{
        const m=ev.data;
        if(!m||m.tab===TAB_ID)return;
        if(m.kind==='update')onRemote&&onRemote(m.payload,true);
        if(m.kind==='presence')onPresence&&onPresence(m.payload,true);
      };
    }
    function broadcast(kind,payload){
      if(channel){try{channel.postMessage({kind,payload,tab:TAB_ID});}catch(e){}}
    }
    let botTimer=null,presenceTimer=null;
    function startBots(){
      stop();
      const tick=()=>{
        const clinics=getClinics?getClinics():window.Dentia.CLINICS;
        const colleagues=['suzuki','tanaka','sato'];
        const who=pick(colleagues);
        const pool=clinics.filter(c=>c.owner!=='me');
        const target=pick(pool.length?pool:clinics);
        const statusKeys=['noanswer','absent','heard','appo','reject'];
        const status=pick(statusKeys);
        const note=pick(BOT_NOTES[status]||['']);
        const update={
          id:'u'+Date.now()+Math.random().toString(36).slice(2,5),
          clinicId:target.id,status,note,who,
          at:new Date().toISOString(),
          text:`${target.name}を「${window.Dentia.STATUS[status].label}」に更新`,
          remote:true,
        };
        onRemote&&onRemote(update,false);
        broadcast('update',update);
        botTimer=setTimeout(tick,7000+Math.random()*6000);
      };
      botTimer=setTimeout(tick,4500);
      const ptick=()=>{
        const colleagues=['suzuki','tanaka','sato'];
        const active=colleagues.filter(()=>Math.random()>0.25).map(id=>({id,activity:pick(ACTIVITIES)}));
        const payload=active.length?active:[{id:'suzuki',activity:'架電中'}];
        onPresence&&onPresence(payload,false);
        broadcast('presence',payload);
        presenceTimer=setTimeout(ptick,3500+Math.random()*2500);
      };
      ptick();
    }
    function stop(){
      if(botTimer)clearTimeout(botTimer);
      if(presenceTimer)clearTimeout(presenceTimer);
      botTimer=presenceTimer=null;
    }
    function pushUpdate(update){broadcast('update',update);}
    return{broadcast:pushUpdate,startBots,stop,TAB_ID};
  }
  window.Dentia=window.Dentia||{};
  window.Dentia.makeRealtime=makeRealtime;
})();
</script>

function useTweaks(defaults){
  const[values,setValues]=React.useState(defaults);
  const setTweak=React.useCallback((keyOrEdits,val)=>{
    const edits=typeof keyOrEdits==='object'&&keyOrEdits!==null?keyOrEdits:{[keyOrEdits]:val};
    setValues((prev)=>({...prev,...edits}));
    window.parent.postMessage({type:'__edit_mode_set_keys',edits},'*');
    window.dispatchEvent(new CustomEvent('tweakchange',{detail:edits}));
  },[]);
  return[values,setTweak];
}

}
function TweakToggle({label,value,onChange}){
  return(<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><button type="button" className="twk-toggle" data-on={value?'1':'0'} role="switch" aria-checked={!!value} onClick={()=>onChange(!value)}><i/></button></div>);
}
function TweakRadio({label,value,options,onChange}){
  const trackRef=React.useRef(null);
  const[dragging,setDragging]=React.useState(false);
  const valueRef=React.useRef(value);valueRef.current=value;
  const labelLen=(o)=>String(typeof o==='object'?o.label:o).length;
  const maxLen=options.reduce((m,o)=>Math.max(m,labelLen(o)),0);
  const fits=maxLen<=({2:16,3:10}[options.length]??0);
  if(!fits){
    const resolve=(s)=>{const m=options.find((o)=>String(typeof o==='object'?o.value:o)===s);return m===undefined?s:typeof m==='object'?m.value:m;};
    return<TweakSelect label={label} value={value} options={options} onChange={(s)=>onChange(resolve(s))}/>;
  }
  const opts=options.map((o)=>(typeof o==='object'?o:{value:o,label:o}));
  const idx=Math.max(0,opts.findIndex((o)=>o.value===value));
  const n=opts.length;
  const segAt=(clientX)=>{const r=trackRef.current.getBoundingClientRect();const inner=r.width-4;const i=Math.floor(((clientX-r.left-2)/inner)*n);return opts[Math.max(0,Math.min(n-1,i))].value;};
  const onPD=(e)=>{
    setDragging(true);const v0=segAt(e.clientX);if(v0!==valueRef.current)onChange(v0);
    const move=(ev)=>{if(!trackRef.current)return;const v=segAt(ev.clientX);if(v!==valueRef.current)onChange(v);};
    const up=()=>{setDragging(false);window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);};
    window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
  };
  return(<TweakRow label={label}><div ref={trackRef} role="radiogroup" onPointerDown={onPD} className={dragging?'twk-seg dragging':'twk-seg'}><div className="twk-seg-thumb" style={{left:`calc(2px + ${idx} * (100% - 4px) / ${n})`,width:`calc((100% - 4px) / ${n})`}}/>{opts.map((o)=>(<button key={o.value} type="button" role="radio" aria-checked={o.value===value}>{o.label}</button>))}</div></TweakRow>);
}
function TweakSelect({label,value,options,onChange}){
  return(<TweakRow label={label}><select className="twk-field" value={value} onChange={(e)=>onChange(e.target.value)}>{options.map((o)=>{const v=typeof o==='object'?o.value:o;const l=typeof o==='object'?o.label:o;return<option key={v} value={v}>{l}</option>;})}</select></TweakRow>);
}
function __twkIsLight(hex){const h=String(hex).replace('#','');const x=h.length===3?h.replace(/./g,(c)=>c+c):h.padEnd(6,'0');const n=parseInt(x.slice(0,6),16);if(Number.isNaN(n))return true;const r=(n>>16)&255,g=(n>>8)&255,b=n&255;return r*299+g*587+b*114>148000;}
const __TwkCheck=({light})=>(<svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light?'rgba(0,0,0,.78)':'#fff'}/></svg>);
function TweakColor({label,value,options,onChange}){
  if(!options||!options.length){return(<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" className="twk-swatch" value={value} onChange={(e)=>onChange(e.target.value)}/></div>);}
  const key=(o)=>String(JSON.stringify(o)).toLowerCase();const cur=key(value);
  return(<TweakRow label={label}><div className="twk-chips" role="radiogroup">{options.map((o,i)=>{const colors=Array.isArray(o)?o:[o];const[hero,...rest]=colors;const on=key(o)===cur;return(<button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on?'1':'0'} style={{background:hero}} onClick={()=>onChange(o)}>{on&&<__TwkCheck light={__twkIsLight(hero)}/>}</button>);})}</div></TweakRow>);
}
Object.assign(window,{useTweaks,TweaksPanel,TweakSection,TweakRow,TweakToggle,TweakRadio,TweakSelect,TweakColor});
</script>

  return{total,done,heard,appo,rate};
}

          </a>

        <a className="tel" href={'tel:'+c.tel.replace(/-/g,'')}><Icon name="phone" size={16} style={{color:'var(--muted)'}}/>{c.tel}</a>
        <div className="badges">
          <Badge status={c.status}/>
          {c.updatedAt&&<span className="badge b-gray">{fmtAgo(c.updatedAt)}更新</span>}
        </div>
        <div className="tabs">
          <div className={'t'+(tab==='history'?' on':'')} onClick={()=>setTab('history')}>履歴</div>
          <div className={'t'+(tab==='info'?' on':'')} onClick={()=>setTab('info')}>基本情報</div>
        </div>
        {tab==='history'?(
          <div className="timeline">
            {c.history.length===0&&<div className="empty" style={{paddingTop:30}}>まだ架電履歴がありません</div>}
            {c.history.map((h,i)=>(
              <div className="tl" key={i}>
                <div className="rail"><div className={'ring r-'+window.Dentia.STATUS[h.status].color}></div>{i<c.history.length-1&&<div className="stem"></div>}</div>
                <div className="body">
                  <div className="meta">
                    <span className="dt">{fmtClock(h.at)}</span>
                    <span className="who">{U[h.who]?.name||''}</span>
                    <Badge status={h.status}/>
                  </div>
                  <div className="note">{h.note||'—'}</div>
                </div>
              </div>
            ))}
          </div>
        ):(
          <div className="info">
            <div className="info-row"><span className="ik">電話番号</span><a className="iv link" href={'tel:'+c.tel.replace(/-/g,'')}>{c.tel}</a></div>
            <div className="info-row"><span className="ik">住所</span><span className="iv">{c.address}</span></div>
            <div className="info-row"><span className="ik">診療時間</span><span className="iv">{c.hours}</span></div>
            <div className="info-row"><span className="ik">担当者</span><span className="iv">{c.owner?U[c.owner].name:'未割当'}</span></div>
            <div className="info-row"><span className="ik">エリア</span><span className="iv">{c.prefecture} {c.city}</span></div>
            <div className="map"><Icon name="pin" size={20} style={{color:'var(--teal)'}}/><span>地図で開く</span></div>
          </div>
        )}
        <div className="p3foot">
          <button className="btn btn-outline" onClick={()=>nav('result',c.id)}>
            <Icon name="plus" size={18}/>架電結果を追加
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── RESULT INPUT ── */
const STATUS_ICON={
  none:    {icon:'phone',   line:true},
  noanswer:{icon:'phoneOff',line:true},
  absent:  {icon:'user',    line:false,str:true},
  heard:   {icon:'chat',    line:false},
  appo:    {icon:'calCheck',line:false,str:true},
  reject:  {icon:'xcircle', line:false,str:true},
};
function ResultScreen({store}){
  const{clinics,nav,clinicId,applyUpdate}=store;
  const c=clinics.find(x=>x.id===clinicId)||clinics[0];
  const S=window.Dentia.STATUS;
  const[sel,setSel]=useState(c.status==='none'?null:c.status);
  const[memo,setMemo]=useState(store.inCallMemo||'');
  const[saved,setSaved]=useState(false);

  useEffect(()=>{
    if(store.inCallMemo){store.setInCallMemo('');}
  },[]);

  const save=()=>{
    if(!sel)return;
    applyUpdate({id:'u'+Date.now(),clinicId:c.id,status:sel,note:memo,who:'me',at:new Date().toISOString(),text:`${c.name}を「${S[sel].label}」に更新`});
    setSaved(true);
    setTimeout(()=>nav('detail',c.id),850);
  };
  return(
    <div className="screen">
      <StatusBar/>
      <AppHead left="close" title="架電結果を入力" onLeft={()=>nav('detail',c.id)}/>
      <div className="pbody np">
        <div className="p2-name">{c.name}</div>
        <a className="p2-tel" href={'tel:'+c.tel.replace(/-/g,'')}>{c.tel}</a>
        <div className="fld-lbl">結果（ステータス）</div>
        <div className="stgrid">
          {window.Dentia.STATUS_ORDER.map(k=>{
            const cfg=STATUS_ICON[k];const on=sel===k;
            return(
              <button key={k} className={`stbtn s-${S[k].color}`+(on?' on':'')} onClick={()=>setSel(k)}>
                {cfg.line?<Icon name={cfg.icon} size={30} sw={1.8} className="line-ic"/>:<span className="circ"><Icon name={cfg.icon} size={24} fill={!cfg.str} sw={2.2} style={{color:'#fff'}}/></span>}
                {S[k].label}
              </button>
            );
          })}
        </div>
        <div className="fld-lbl">メモ（任意）</div>
        <div className="ta-wrap">
          <textarea value={memo} maxLength={200} onChange={e=>setMemo(e.target.value)} placeholder="聞き出した悩みや、次回約束などを入力"></textarea>
          <div className="ta-count">{memo.length}/200</div>
        </div>
        <button className="btn btn-outline voice" onClick={()=>setMemo(m=>(m?m+' ':'')+'（音声入力：次回は木曜午後に再連絡）')}>
          <Icon name="mic" size={18}/>音声入力
        </button>
        <div className="p2foot">
          <button className={'btn btn-primary'+(!sel?' disabled':'')+(saved?' ok':'')} onClick={save} disabled={!sel}>
            {saved?<><Icon name="check" size={22} style={{color:'#fff'}}/>保存しました</>:'保存して次へ'}
          </button>
          <div className="cap">{sel?'Enterで保存':'ステータスを選択してください'}</div>
        </div>
      </div>
    </div>
  );
}

/* ── IN-CALL MEMO ── */
function InCallScreen({store}){
  const{clinics,nav,clinicId}=store;
  const c=clinics.find(x=>x.id===clinicId)||clinics[0];
  const[memo,setMemo]=useState('');
  const[elapsed,setElapsed]=useState(0);

  useEffect(()=>{
    const t=setInterval(()=>setElapsed(e=>e+1),1000);
    return()=>clearInterval(t);
  },[]);

  const fmtSec=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  const endCall=()=>{
    store.setInCallMemo(memo);
    nav('result',c.id);
  };

  return(
    <div className="screen incall-screen">
      <StatusBar/>
      <AppHead left="close" title="通話中" onLeft={()=>nav('detail',c.id)}/>
      <div className="pbody" style={{alignItems:'stretch'}}>
        <div className="incall-hero">
          <div className="call-pulse-ring">
            <div className="call-pulse-fab">
              <Icon name="phone" fill size={34} style={{color:'#fff'}}/>
            </div>
          </div>
          <div className="incall-name">{c.name}</div>
          <div className="incall-tel">{c.tel}</div>
          <div className="incall-timer">{fmtSec(elapsed)}</div>
        </div>

        <div style={{marginTop:4}}>
          <div className="fld-lbl" style={{marginTop:0}}>通話メモ</div>
          <div className="ta-wrap">
            <textarea
              value={memo}
              maxLength={200}
              onChange={e=>setMemo(e.target.value)}
              placeholder="ヒアリング内容・悩み・次回の約束などをリアルタイムでメモ…"
              style={{minHeight:140}}
              autoFocus
            />
            <div className="ta-count">{memo.length}/200</div>
          </div>
          <div className="memo-hint">通話終了後、そのままステータス入力へ進めます</div>
        </div>
      </div>

      <div className="incall-foot">
        <button className="btn btn-primary btn-danger" onClick={endCall}>
          <Icon name="phoneOff" size={22} style={{color:'#fff'}}/>通話終了・結果を入力
        </button>
        <button className="btn btn-outline" style={{marginTop:10}} onClick={()=>nav('detail',c.id)}>
          後で入力
        </button>
      </div>
    </div>
  );
}

/* ── HISTORY ── */
function HistoryScreen({store}){
  const{clinics,nav}=store;
  const U=window.Dentia.USERS;
  const feed=[];
  clinics.forEach(c=>c.history.forEach(h=>feed.push({...h,clinic:c})));
  feed.sort((a,b)=>new Date(b.at)-new Date(a.at));
  return(
    <div className="screen">
      <StatusBar/>
      <AppHead left="menu" title="架電履歴" right="refresh"/>
      <div className="pbody list-body">
        <div className="feed">
          {feed.map((h,i)=>(
            <div className="feed-item" key={i} onClick={()=>nav('detail',h.clinic.id)}>
              <Avatar user={U[h.who]||U.me} size={36}/>
              <div className="fi-body">
                <div className="fi-top"><b>{h.clinic.name}</b><span className="fi-time">{fmtClock(h.at)}</span></div>
                <div className="fi-meta"><Badge status={h.status}/><span className="fi-who">{U[h.who]?.name}</span></div>
                {h.note&&<div className="fi-note">{h.note}</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD ── */
function DashScreen({store}){
  const{clinics,nav}=store;
  const S=window.Dentia.STATUS;
  const p=useProgress(clinics);
  const counts={};
  window.Dentia.STATUS_ORDER.forEach(k=>counts[k]=clinics.filter(c=>c.status===k).length);
  const appoRate=p.done?(p.appo/p.done*100):0;
  return(
    <div className="screen">
      <StatusBar/>
      <AppHead left="menu" title="進捗ダッシュボード" right="refresh"/>
      <div className="pbody list-body">
        <div className="dash-card">
          <div className="dash-head"><h4>今週の進捗 (6/1〜6/7)</h4></div>
          <div className="dash3">
            <div className="c"><div className="k">架電数</div><div className="v">{p.done}<small>件</small></div></div>
            <div className="c"><div className="k">ヒアリング</div><div className="v">{p.heard}<small>件</small></div></div>
            <div className="c"><div className="k">アポ獲得</div><div className="v">{p.appo}<small>件</small></div></div>
          </div>
          <div className="dash-bar"></div>
          <div className="dash2">
            <div className="c"><div className="k">ヒアリング率</div><div className="v">{p.rate.toFixed(1)}<small>%</small></div></div>
            <div className="c"><div className="k">アポ率</div><div className="v">{appoRate.toFixed(1)}<small>%</small></div></div>
          </div>
        </div>
        <div className="cc-block">
          <h2>ステータス別サマリー</h2>
          {window.Dentia.STATUS_ORDER.map(k=>(
            <div className="sumrow" key={k} onClick={()=>nav('list')}>
              <span className="sdot" style={{background:`var(--${S[k].color})`}}></span>
              <span className="slabel">{S[k].label}</span>
              <span className="scount">{counts[k]}<small>件</small></span>
              <Icon name="chevR" size={16} sw={2.4} style={{color:'var(--muted2)'}}/>
            </div>
          ))}
        </div>
        <div className="cc-block">
          <h2>架電数の内訳（バー）</h2>
          <div className="hbars">
            {window.Dentia.STATUS_ORDER.map(k=>{
              const max=Math.max(...Object.values(counts),1);
              return(
                <div className="hbar" key={k}>
                  <span className="hb-label">{S[k].label}</span>
                  <div className="hb-track"><i style={{width:(counts[k]/max*100)+'%',background:`var(--${S[k].color})`}}></i></div>
                  <span className="hb-num">{counts[k]}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window,{HomeScreen,ListScreen,DetailScreen,ResultScreen,InCallScreen,HistoryScreen,DashScreen,nextToCall});
</script>

<!-- ═══════════════ APP SHELL ═══════════════ -->
<script type="text/babel">
const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{
  "accent":"#0c8c8b",
  "font":"Noto Sans JP",
  "density":"regular",
  "dark":false,
  "bots":true
}/*EDITMODE-END*/;

const SCREEN_TAB={home:'home',list:'list',detail:'list',result:'list',incall:'list',history:'history',dash:'dash'};

function applyUpdateToClinics(clinics,u){
  return clinics.map(c=>{
    if(c.id!==u.clinicId)return c;
    return{...c,status:u.status,owner:u.who,lastMemo:u.note||c.lastMemo,updatedAt:u.at,
           history:[{at:u.at,who:u.who,status:u.status,note:u.note||''},...c.history]};
  });
}

function App(){
  const[t,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const[clinics,setClinics]=useState(()=>window.Dentia.CLINICS.map(c=>({...c,history:[...c.history]})));
  const[presence,setPresence]=useState([]);
  const[toast,setToast]=useState(null);
  const[flashId,setFlashId]=useState(null);
  const[view,setView]=useState({screen:'home',clinicId:null});
  const[inCallMemo,setInCallMemo]=useState('');

  const clinicsRef=useRef(clinics);clinicsRef.current=clinics;
  const rtRef=useRef(null);
  const toastTimer=useRef(null);
  const flashTimer=useRef(null);

  const showToast=useCallback((who,text)=>{
    setToast({id:Date.now()+Math.random(),who,text});
    clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(null),3600);
  },[]);

  const flash=useCallback((clinicId)=>{
    setFlashId(clinicId);
    clearTimeout(flashTimer.current);
    flashTimer.current=setTimeout(()=>setFlashId(null),1400);
  },[]);

  const onRemote=useCallback((u)=>{
    setClinics(cs=>applyUpdateToClinics(cs,u));
    if(u.who!=='me'){showToast(u.who,u.text);flash(u.clinicId);}
  },[showToast,flash]);

  const onPresence=useCallback((list)=>{setPresence(list.filter(p=>p.id!=='me'));},[]);

  const applyUpdate=useCallback((u)=>{
    setClinics(cs=>applyUpdateToClinics(cs,u));
    if(rtRef.current)rtRef.current.broadcast(u);
  },[]);

  useEffect(()=>{
    const rt=window.Dentia.makeRealtime({onRemote:(u)=>onRemote(u),onPresence:(list)=>onPresence(list),getClinics:()=>clinicsRef.current});
    rtRef.current=rt;
    return()=>rt.stop();
  },[onRemote,onPresence]);

  useEffect(()=>{
    const rt=rtRef.current;if(!rt)return;
    if(t.bots)rt.startBots();else{rt.stop();setPresence([]);}
  },[t.bots]);

  const nav=useCallback((screen,clinicId=null)=>{
    if(screen==='next'){
      const nx=window.nextToCall(clinicsRef.current);
      setView({screen:'incall',clinicId:nx.id});
    }else{
      setView({screen,clinicId});
    }
    document.querySelector('.screen-scroll')?.scrollTo(0,0);
  },[]);

  const store={clinics,presence,nav,applyUpdate,flashId,clinicId:view.clinicId,me:'me',inCallMemo,setInCallMemo};

  const Screen={
    home:HomeScreen,list:ListScreen,detail:DetailScreen,
    result:ResultScreen,incall:InCallScreen,history:HistoryScreen,dash:DashScreen,
  }[view.screen]||HomeScreen;

  const densityClass='dens-'+t.density;

  return(
    <div className={'app-root '+densityClass+(t.dark?' dark':'')}
         style={{'--teal':t.accent,'--teal-d':t.accent,fontFamily:`'${t.font}', sans-serif`}}>
      <div className="device">
        <div className="device-screen">
          <div className="screen-scroll">
            <Screen store={store}/>
          </div>
          <Toast toast={toast}/>
          <TabBar tab={SCREEN_TAB[view.screen]} onTab={nav}/>
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="ブランド"/>
        <TweakColor label="アクセント" value={t.accent}
                    options={['#0c8c8b','#6ab3e0','#8aa9e6','#b596de','#ec9bc1']}
                    onChange={v=>setTweak('accent',v)}/>
        <TweakSelect label="フォント" value={t.font}
                     options={['Noto Sans JP','Zen Kaku Gothic New','Zen Maru Gothic','M PLUS Rounded 1c']}
                     onChange={v=>setTweak('font',v)}/>
        <TweakSection label="レイアウト"/>
        <TweakRadio label="情報密度" value={t.density}
                    options={['compact','regular','comfy']}
                    onChange={v=>setTweak('density',v)}/>
        <TweakToggle label="ダークモード" value={t.dark} onChange={v=>setTweak('dark',v)}/>
        <TweakSection label="リアルタイム共有"/>
        <TweakToggle label="同僚の自動更新を流す" value={t.bots} onChange={v=>setTweak('bots',v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
function fitDevice(){
  const d=document.querySelector('.device');if(!d)return;
  const s=Math.min((window.innerWidth-24)/390,(window.innerHeight-24)/844,1);
  d.style.transform='scale('+s+')';
}
window.addEventListener('resize',fitDevice);
const obs=new MutationObserver(fitDevice);
obs.observe(document.getElementById('root'),{childList:true,subtree:true});
setTimeout(fitDevice,300);setTimeout(fitDevice,900);
</script>
</body>
</html>
